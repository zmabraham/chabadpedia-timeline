<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chabad History Timeline</title>
  <style>
    :root {
      --bg: #0d0d11;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --border: #2a2a3a;
      --accent: #c8963e;
      --text: #e8e4dc;
      --text-dim: #8a8880;
      --text-faint: #555;

      --c-pre_chabad: #8b7355;
      --c-alter_rebbe: #7b5ea7;
      --c-mitteler_rebbe: #5898c8;
      --c-tzemach_tzedek: #5ba87e;
      --c-maharash: #78a878;
      --c-rashab: #c8963e;
      --c-frierdiker_soviet: #c85858;
      --c-frierdiker_war: #a878c8;
      --c-rebbe_early: #5898c8;
      --c-rebbe_expansion: #5ba87e;
      --c-rebbe_final: #e8c040;
      --c-modern: #78a8a8;

      --c-milestone: #c8963e;
      --c-campaign: #5ba87e;
      --c-world: #c85858;
      --c-organization: #5898c8;
      --c-passing: #8866aa;
      --c-birth: #78b878;
      --c-publication: #58a8c8;
      --c-education: #78c878;
      --c-persecution: #d06050;
      --c-liberation: #60c890;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ─── HEADER ─── */
    header {
      background: linear-gradient(135deg, #0f0a1a 0%, #0a0f18 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px 14px;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Georgia', serif;
      letter-spacing: 0.01em;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: sans-serif;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="search"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: sans-serif;
      min-width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="search"]:focus { border-color: var(--accent); }

    .cat-filters {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.75rem;
      font-family: sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { color: var(--text); border-color: #666; }
    .chip.on { color: #fff; border-color: transparent; }
    .chip[data-f="all"].on { background: var(--accent); }
    .chip[data-f="milestone"].on { background: var(--c-milestone); }
    .chip[data-f="campaign"].on { background: var(--c-campaign); }
    .chip[data-f="world"].on { background: var(--c-world); }
    .chip[data-f="organization"].on { background: var(--c-organization); }
    .chip[data-f="passing"].on { background: var(--c-passing); }
    .chip[data-f="birth"].on { background: var(--c-birth); }
    .chip[data-f="publication"].on { background: var(--c-publication); }
    .chip[data-f="persecution"].on { background: var(--c-persecution); }
    .chip[data-f="liberation"].on { background: var(--c-liberation); }
    .chip[data-f="education"].on { background: var(--c-education); }

    /* ─── STATS BAR ─── */
    .stats {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 24px;
      font-size: 0.75rem;
      font-family: sans-serif;
      color: var(--text-dim);
      display: flex;
      gap: 20px;
      align-items: center;
    }

    /* ─── LAYOUT ─── */
    .layout {
      display: flex;
      height: calc(100vh - 118px);
    }

    /* ─── ERA SIDEBAR ─── */
    .era-sidebar {
      width: 190px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 0 24px;
    }

    .era-sidebar-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      font-family: sans-serif;
      padding: 0 12px 8px;
    }

    .era-nav-item {
      padding: 7px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: sans-serif;
      line-height: 1.3;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .era-nav-item:hover { background: var(--surface2); }
    .era-nav-item.active { border-left-color: var(--accent); background: var(--surface2); }

    .era-nav-year {
      font-size: 0.65rem;
      color: var(--text-faint);
      font-family: sans-serif;
    }

    /* ─── YEAR NAV ─── */
    .year-sidebar {
      width: 64px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 8px 0;
    }

    .year-nav-item {
      padding: 3px 0;
      text-align: center;
      cursor: pointer;
      font-size: 0.68rem;
      font-family: sans-serif;
      color: var(--text-faint);
      transition: color 0.1s;
    }
    .year-nav-item:hover { color: var(--accent); }

    /* ─── MAIN TIMELINE ─── */
    .timeline {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 80px;
    }

    /* ─── ERA SECTION ─── */
    .era-section {
      border-top: 2px solid;
      margin-top: 0;
    }

    .era-header {
      padding: 16px 28px 12px;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(8px);
      background: rgba(13,13,17,0.92);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .era-header h2 {
      font-size: 1.05rem;
      font-weight: 600;
      font-family: 'Georgia', serif;
    }

    .era-header-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: sans-serif;
      margin-top: 2px;
    }

    /* ─── EVENT CARD ─── */
    .event {
      display: flex;
      gap: 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .event:hover { background: rgba(255,255,255,0.025); }

    .event-year-col {
      width: 72px;
      flex-shrink: 0;
      padding: 14px 0 14px 16px;
      font-size: 0.75rem;
      font-family: sans-serif;
      color: var(--text-faint);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .event-line {
      width: 20px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 18px;
    }

    .event-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .event-vline {
      width: 1px;
      flex: 1;
      background: var(--border);
      margin-top: 4px;
    }

    .event-body {
      flex: 1;
      padding: 12px 28px 14px 12px;
    }

    .event-title-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }

    .event-title {
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Georgia', serif;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }

    .cat-tag {
      font-size: 0.65rem;
      font-family: sans-serif;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .event-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.65;
      font-family: 'Georgia', serif;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .event.expanded .event-desc {
      -webkit-line-clamp: unset;
      display: block;
    }

    .expand-hint {
      font-size: 0.7rem;
      font-family: sans-serif;
      color: var(--text-faint);
      margin-top: 4px;
    }
    .event.expanded .expand-hint { display: none; }

    /* ─── EMPTY STATE ─── */
    .empty {
      padding: 60px;
      text-align: center;
      color: var(--text-dim);
      font-family: sans-serif;
    }

    /* ─── LOADING ─── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 12px;
    }
    #loading h2 { color: var(--accent); font-size: 1.2rem; }
    #loading p { color: var(--text-dim); font-size: 0.85rem; font-family: sans-serif; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ─── CAT COLORS ─── */
    .dc-milestone { background: rgba(200,150,62,0.12); color: var(--c-milestone); }
    .dc-campaign { background: rgba(91,168,126,0.12); color: var(--c-campaign); }
    .dc-world { background: rgba(200,88,88,0.12); color: var(--c-world); }
    .dc-organization { background: rgba(88,152,200,0.12); color: var(--c-organization); }
    .dc-passing { background: rgba(136,102,170,0.12); color: var(--c-passing); }
    .dc-birth { background: rgba(120,184,120,0.12); color: var(--c-birth); }
    .dc-publication { background: rgba(88,168,200,0.12); color: var(--c-publication); }
    .dc-education { background: rgba(120,200,120,0.12); color: var(--c-education); }
    .dc-persecution { background: rgba(208,96,80,0.12); color: var(--c-persecution); }
    .dc-liberation { background: rgba(96,200,144,0.12); color: var(--c-liberation); }

    @media (max-width: 700px) {
      .era-sidebar, .year-sidebar { display: none; }
      .layout { height: calc(100vh - 130px); }
    }
  </style>
</head>
<body>

<div id="loading">
  <h2>Chabad History Timeline</h2>
  <p>Loading 300 years of history…</p>
</div>

<header>
  <div class="header-top">
    <h1>Chabad History Timeline</h1>
    <span class="subtitle">From the Baal Shem Tov to the Present</span>
  </div>
  <div class="controls">
    <input type="search" id="search" placeholder="Search events…">
    <div class="cat-filters">
      <button class="chip on" data-f="all">All</button>
      <button class="chip" data-f="milestone">Milestone</button>
      <button class="chip" data-f="birth">Birth/Marriage</button>
      <button class="chip" data-f="passing">Passing</button>
      <button class="chip" data-f="persecution">Persecution</button>
      <button class="chip" data-f="liberation">Liberation</button>
      <button class="chip" data-f="publication">Publication</button>
      <button class="chip" data-f="education">Education</button>
      <button class="chip" data-f="organization">Organization</button>
      <button class="chip" data-f="campaign">Campaign</button>
      <button class="chip" data-f="world">World Events</button>
    </div>
  </div>
</header>

<div class="stats">
  <span id="stat-count">Loading…</span>
  <span id="stat-years"></span>
  <span id="stat-filter" style="color:var(--accent)"></span>
</div>

<div class="layout">
  <nav class="era-sidebar" id="era-sidebar"></nav>
  <div class="timeline" id="timeline"></div>
  <nav class="year-sidebar" id="year-sidebar"></nav>
</div>

<script>
const CAT_LABELS = {
  milestone: 'Milestone', campaign: 'Campaign', world: 'World Events',
  organization: 'Organization', passing: 'Passing', birth: 'Birth/Marriage',
  publication: 'Publication', education: 'Education', persecution: 'Persecution',
  liberation: 'Liberation'
};

let DATA = null;
let activeFilter = 'all';
let searchTerm = '';

function getEraForYear(year, eras) {
  for (const [key, era] of Object.entries(eras)) {
    if (year >= era.years[0] && year < era.years[1]) return key;
  }
  return Object.keys(eras).at(-1);
}

function filterEvents() {
  if (!DATA) return [];
  return DATA.events.filter(e => {
    if (activeFilter !== 'all' && e.cat !== activeFilter) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      return (e.title.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q));
    }
    return true;
  });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const events = filterEvents();
  const timeline = document.getElementById('timeline');
  const eraSidebar = document.getElementById('era-sidebar');
  const yearSidebar = document.getElementById('year-sidebar');

  // Update stats
  document.getElementById('stat-count').textContent = `${events.length} events`;
  const years = events.map(e => e.year);
  if (years.length) {
    document.getElementById('stat-years').textContent =
      `${Math.min(...years)}–${Math.max(...years)}`;
  }
  document.getElementById('stat-filter').textContent =
    activeFilter !== 'all' ? `Filtered: ${CAT_LABELS[activeFilter]}` : '';

  if (!events.length) {
    timeline.innerHTML = '<div class="empty">No events match your filters.</div>';
    eraSidebar.innerHTML = '';
    yearSidebar.innerHTML = '';
    return;
  }

  // Group by era
  const byEra = {};
  for (const e of events) {
    const era = e.era || getEraForYear(e.year, DATA.eras);
    if (!byEra[era]) byEra[era] = [];
    byEra[era].push(e);
  }

  // Build timeline HTML
  let html = '';
  let eraNavHtml = '<div class="era-sidebar-title">Eras</div>';
  let yearNavItems = new Set();

  for (const [eraKey, eraData] of Object.entries(DATA.eras)) {
    const eraEvents = byEra[eraKey] || [];
    if (!eraEvents.length) continue;

    const color = eraData.color;
    const years = eraEvents.map(e => e.year);
    const yearRange = `${Math.min(...years)}–${Math.max(...years)}`;

    html += `<div class="era-section" id="era-${eraKey}" style="border-color:${color}">
      <div class="era-header" onclick="toggleEra('${eraKey}')" style="border-bottom-color:${color}30">
        <h2 style="color:${color}">${esc(eraData.label)}</h2>
        <div class="era-header-meta">${yearRange} · ${eraEvents.length} events</div>
      </div>
      <div class="era-body" id="era-body-${eraKey}">`;

    // Group by year within era
    const byYear = {};
    for (const e of eraEvents) {
      if (!byYear[e.year]) byYear[e.year] = [];
      byYear[e.year].push(e);
      yearNavItems.add(e.year);
    }

    let prevYear = null;
    for (const year of Object.keys(byYear).sort((a,b) => a-b)) {
      for (const e of byYear[year]) {
        const dotColor = `var(--c-${e.cat}, #888)`;
        const showYear = year !== prevYear;
        if (showYear) prevYear = year;

        html += `<div class="event" id="event-${e.year}-${esc(e.title).replace(/\s/g,'-').slice(0,20)}">
          <div class="event-year-col" style="color:${showYear ? color : 'transparent'}">${showYear ? year : '·'}</div>
          <div class="event-line">
            <div class="event-dot" style="background:${dotColor}"></div>
            <div class="event-vline" style="background:${color}22"></div>
          </div>
          <div class="event-body">
            <div class="event-title-row">
              <div class="event-title">${esc(e.title)}</div>
              <span class="cat-tag dc-${e.cat}">${CAT_LABELS[e.cat] || e.cat}</span>
            </div>
            ${e.desc ? `<div class="event-desc">${esc(e.desc)}</div>` : ''}
            ${e.desc && e.desc.length > 120 ? `<div class="expand-hint">↓ click to expand</div>` : ''}
          </div>
        </div>`;
      }
    }

    html += `</div></div>`;

    eraNavHtml += `<div class="era-nav-item" onclick="scrollToEra('${eraKey}')">
      <div style="color:${color};font-weight:600;font-size:0.78rem">${esc(eraData.label)}</div>
      <div class="era-nav-year">${yearRange}</div>
    </div>`;
  }

  timeline.innerHTML = html;

  // Year nav
  const sortedYears = [...yearNavItems].sort((a,b)=>a-b);
  yearSidebar.innerHTML = sortedYears
    .map(y => `<div class="year-nav-item" onclick="scrollToYear(${y})">${y}</div>`)
    .join('');

  eraSidebar.innerHTML = eraNavHtml;

  // Re-attach expand handlers
  document.querySelectorAll('.event').forEach(el => {
    el.addEventListener('click', () => el.classList.toggle('expanded'));
  });
}

function toggleEra(key) {
  const body = document.getElementById('era-body-' + key);
  if (body) body.style.display = body.style.display === 'none' ? '' : '';
}

function scrollToEra(key) {
  const el = document.getElementById('era-' + key);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // Update sidebar active
  document.querySelectorAll('.era-nav-item').forEach(n => n.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');
}

function scrollToYear(y) {
  const els = document.querySelectorAll('.event-year-col');
  for (const el of els) {
    if (el.textContent.trim() == y) {
      el.closest('.event').scrollIntoView({ behavior: 'smooth', block: 'start' });
      return;
    }
  }
}

// Controls
document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter = btn.dataset.f;
    render();
  });
});

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = e.target.value.trim();
    render();
  }, 250);
});

// Load data
fetch('chabad-history-en.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    document.getElementById('loading').style.display = 'none';
    render();
  })
  .catch(err => {
    document.getElementById('loading').innerHTML =
      `<h2 style="color:#c85858">Error loading data</h2><p>${err.message}</p>`;
  });
</script>
</body>
</html>
